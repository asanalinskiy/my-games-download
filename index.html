<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>скачать мои два игры:)</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <style>
        /* Сброс базовых стилей */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0b0b0e;
            color: #ffffff;
            position: relative;
            overflow: hidden;
        }

        /* Контейнер для заднего фона с эффектом зума */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Используем wallpaper.png вместо .jpg */
            background-image: url('wallpaper.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 0.8s ease-out;
            z-index: 1;
        }

        /* Затемняющая маска поверх фона */
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2;
        }

        /* Стеклянная карточка по центру */
        .card {
            position: relative;
            z-index: 3;
            text-align: center;
            padding: 45px 35px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            max-width: 480px;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Текст-заголовок */
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 35px;
            color: #f3f4f6;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        /* Кнопка скачивания */
        .download-btn {
            display: inline-block;
            padding: 16px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            /* Градиент в фирменных цветах Python */
            background: linear-gradient(135deg, #306998 0%, #ffd43b 100%);
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(48, 105, 152, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
        }

        /* Эффект при наведении на кнопку */
        .download-btn:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 15px 30px rgba(255, 212, 59, 0.4);
            border-color: rgba(255, 255, 255, 0.4);
        }

        /* Интерактивный зум фона при наведении на кнопку скачивания */
        .card:hover ~ .bg-container {
            transform: scale(1.05);
        }

        /* Эффект при клике */
        .download-btn:active {
            transform: scale(0.97) translateY(1px);
        }

        /* Анимация плавного появления */
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>
    <div class="bg-container"></div>

    <div class="card">
        <h1>давай, скачай же мои две игры - змейка и блокбласт на пайтоне:)</h1>
        <a href="https://github.com/asanalinskiy/my-games-download/releases/download/zip/games.zip" class="download-btn" download>скачать:)</a>
    </div>

</body>
</html>
